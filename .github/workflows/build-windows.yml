name: Build Windows Client

on:
  workflow_dispatch:        # Manual trigger
  push:                     # Optional: auto-build on push, remove if not needed
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code with submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt 6.5.3
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2022_64'
        modules: 'qt5compat'          # Compatibility module if required

    - name: Install OpenSSL
      run: |
        choco install openssl --version=3.2.0 -y
        echo "$env:ProgramFiles\OpenSSL-Win64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="${{ env.QT6_DIR }}"

    - name: Build
      run: cmake --build build --config Release --parallel $env:NUMBER_OF_PROCESSORS

    - name: Deploy with windeployqt and copy OpenSSL DLLs
      run: |
        windeployqt --release --no-translations build/Release/AdaptixClient.exe
        copy "C:\Program Files\OpenSSL-Win64\bin\libcrypto-3-x64.dll" build\Release\
        copy "C:\Program Files\OpenSSL-Win64\bin\libssl-3-x64.dll" build\Release\

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AdaptixClient-Windows
        path: build/Release/
