name: Build Windows Client (MSYS2)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-qt6
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-ntldd
          git

    - name: Checkout code with submodules
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Debug - List root and AdaptixClient
      run: |
        echo "Workspace: $GITHUB_WORKSPACE"
        ls -la
        echo "--- AdaptixClient ---"
        ls -la AdaptixClient

    - name: Configure CMake
      run: |
        export PATH="/mingw64/bin:$PATH"
        mkdir -p build
        cd build
        cmake "$GITHUB_WORKSPACE/AdaptixClient" -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        export PATH="/mingw64/bin:$PATH"
        cmake --build build --parallel $(nproc)

    - name: Deploy with windeployqt and copy all dependencies
      run: |
        export PATH="/mingw64/bin:$PATH"
        cd build
        windeployqt --release --no-translations --force-openssl AdaptixClient.exe

        # Attempt automatic dependency collection with ntldd (ignore errors)
        echo "Attempting automatic DLL copy with ntldd..."
        set +e
        ntldd -R AdaptixClient.exe 2>/dev/null | grep '=> /mingw64/bin/' | awk '{print $3}' | while read -r dll; do
          if [ -f "$dll" ]; then
            cp -n "$dll" . 2>/dev/null || true
          fi
        done
        set -e

        # Fallback: copy known critical runtime / library DLLs (will not overwrite existing)
        echo "Copying known critical DLLs as safety net..."
        for dll in libgcc_s_seh-1.dll libwinpthread-1.dll libstdc++-6.dll \
                   libfreetype-6.dll libharfbuzz-0.dll libmd4c.dll libpng16-16.dll \
                   libbz2-1.dll libbrotlidec.dll libbrotlicommon.dll libglib-2.0-0.dll \
                   libintl-8.dll libiconv-2.dll libpcre2-8-0.dll libgraphite2.dll \
                   libzstd.dll libdouble-conversion.dll libicuin74.dll libicuuc74.dll \
                   libicudt74.dll libcrypto-3-x64.dll libssl-3-x64.dll; do
          if [ -f "/mingw64/bin/$dll" ]; then
            cp -n "/mingw64/bin/$dll" . 2>/dev/null || true
          fi
        done

        echo "All dependencies copied. DLL list:"
        ls *.dll

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: AdaptixClient-Windows
        path: build/
