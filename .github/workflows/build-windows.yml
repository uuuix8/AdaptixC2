name: Build Windows Client (MSYS2) - Full DLL Pack

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-qt6
          mingw-w64-x86_64-openssl
          git

    - name: Checkout code with submodules
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Debug - List root and AdaptixClient
      run: |
        echo "Workspace: $GITHUB_WORKSPACE"
        ls -la
        echo "--- AdaptixClient ---"
        ls -la AdaptixClient

    - name: Configure CMake
      run: |
        export PATH="/mingw64/bin:$PATH"
        mkdir -p build
        cd build
        cmake "$GITHUB_WORKSPACE/AdaptixClient" -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        export PATH="/mingw64/bin:$PATH"
        cmake --build build --parallel $(nproc)

    - name: Deploy and dump ALL DLLs
      run: |
        export PATH="/mingw64/bin:$PATH"
        cd build
        windeployqt --release --no-translations --force-openssl AdaptixClient.exe

        echo "Brute force copying ALL DLLs from /mingw64/bin/..."
        set +e
        cp -n /mingw64/bin/*.dll . 2>/dev/null || true
        set -e

        echo "DLL dump complete. Total files in build:"
        ls -1 *.dll | wc -l

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: AdaptixClient-Windows-Full
        path: build/
