name: Build Windows Client (MSYS2)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-qt6
          mingw-w64-x86_64-openssl
          git

    - name: Checkout code with submodules
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Deploy with windeployqt
      run: |
        cd build
        windeployqt --release --no-translations AdaptixClient.exe
        cp /mingw64/bin/libcrypto-3-x64.dll .
        cp /mingw64/bin/libssl-3-x64.dll .

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: AdaptixClient-Windows
        path: build/
