name: Build Windows Client (MSYS2)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-qt6
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-ldd
          git

    - name: Checkout code with submodules
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Debug - List root and AdaptixClient
      run: |
        echo "Workspace: $GITHUB_WORKSPACE"
        ls -la
        echo "--- AdaptixClient ---"
        ls -la AdaptixClient

    - name: Configure CMake
      run: |
        export PATH="/mingw64/bin:$PATH"
        mkdir -p build
        cd build
        cmake "$GITHUB_WORKSPACE/AdaptixClient" -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        export PATH="/mingw64/bin:$PATH"
        cmake --build build --parallel $(nproc)

    - name: Deploy with windeployqt and auto-copy all dependencies
      run: |
        export PATH="/mingw64/bin:$PATH"
        cd build
        windeployqt --release --no-translations --force-openssl AdaptixClient.exe

        # Use ldd to find all non-system DLL dependencies and copy them
        echo "Copying all required runtime DLLs..."
        ldd AdaptixClient.exe | grep '=> /mingw64/bin/' | awk '{print $3}' | while read -r dll; do
          if [ -f "$dll" ]; then
            cp -n "$dll" . 2>/dev/null || true
          fi
        done

        # Also copy OpenSSL explicitly (in case not caught by ldd due to delayed load)
        cp -n /mingw64/bin/libcrypto-3-x64.dll . 2>/dev/null || true
        cp -n /mingw64/bin/libssl-3-x64.dll . 2>/dev/null || true

        echo "Done. Contents of build:"
        ls -la *.dll

    - name: Upload artifact
      uses: actions/upload-artifact@v5
      with:
        name: AdaptixClient-Windows
        path: build/
